<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cicás játékok webshop, admin felület">
    <meta name="keywords" content="cica, cica játék">
    <meta name="author" content="Molnár Beatrix">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Admin oldal</title>
    <script type="module" src="index.js"></script>
</head>

<body class="d-flex flex-column min-vh-100 m-0 p-0">
    <main class="flex-grow-1 d-flex flex-column">
        <header class="py-3 bg-dark text-light text-center"><h1 class="m-0 fs-2 fw-bold">🐱 Mancs Pláza</h1></header>
    <nav class="py-2  mb-4 bg-secondary fs-5 ">
        <ul class="nav justify-content-center">
            <li class="nav-item"><a class="nav-link text-light" href="index.html">Public</a></li>
            <li class="nav-item"><a class="nav-link active text-light" href="admin.html">Admin</a></li>
        </ul>
    </nav>

    <section class="szures mb-1">
        <p class="mb-1 text-center fw-bold fs-5">Szűrők</p>
        <div class="d-flex justify-content-center  gap-3">
            <button class="btn btn-outline-dark">Összes</button>
            <button class="btn btn-outline-dark">Plüss</button>
            <button class="btn btn-outline-dark">Pálca</button>
            <button class="btn btn-outline-dark">Labda</button>
        </div>
    </section>

    <section class="rendezes mb-1">
        <p class="mb-1 text-center fw-bold fs-5">Rendezés</p>
        <div class="d-flex justify-content-center  gap-3">
            <button class="btn btn-outline-dark" id="nev_no">Név (A→Z)</button>
            <button class="btn btn-outline-dark" id="nev_csokk">Név (Z→A)</button>
            <button class="btn btn-outline-dark" id="ar_no">Ár (alacsony → magas)</button>
            <button class="btn btn-outline-dark" id="ar_csokk">Ár (magas → alacsony)</button>
        </div>
    </section>


    <article>
        <table class="table table-striped table-hover table-bordered text-center">
            <thead class="table-dark">
                <tr>
                    <th>Név</th>
                    <th>Ár</th>
                    <th>Mennyiség</th>
                    <th>Törlés</th>
                    <th>Visszavonás</th>
                </tr>
            </thead>
            <tbody class="tablazat_tartalom"></tbody>
        </table>
    </article>

    <footer class="mt-auto text-center py-3 bg-dark text-light">&copy; Minden jog fenntartva!</footer>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
