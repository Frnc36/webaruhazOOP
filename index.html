<!DOCTYPE html>
<html lang="hu-HU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cicás játékok webshop">
    <meta name="keywords" content="cica, cica játék">
    <meta name="author" content="Mágori Ferenc Ferdinánd">
    <script type="module" src="index.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Public oldal - Mancs Pláza</title>
</head>
<body class="d-flex flex-column min-vh-100 m-0 p-0">
    <main>
        <header class="py-3 bg-dark text-light text-center">
            <h1 class="m-0 fs-2 fw-bold">🐱 Mancs Pláza</h1>
        </header>
        
        <nav class="py-2 bg-secondary fs-5">
            <ul class="nav justify-content-center">
                <li class="nav-item"><a class="nav-link text-light active" href="index.html">Public</a></li>
                <li class="nav-item"><a class="nav-link text-light" href="admin.html">Admin</a></li>
            </ul>
        </nav>
        
        <!-- Szűrők -->
        <div class="szures container mt-3">
            <div class="d-flex justify-content-center gap-3">
                <button class="btn bg-white text-dark border border-dark">Összes</button>
                <button class="btn bg-white text-dark border border-dark">Plüss</button>
                <button class="btn bg-white text-dark border border-dark">Pálca</button>
                <button class="btn bg-white text-dark border border-dark">Labda</button>
            </div>
        </div>

        <!-- Termékek és kosár -->
        <div class="container py-4">
            <div class="row">
                <!-- Termékek, kartyak -->
                <div class="col-lg-8">
                    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-2 row-cols-xl-3 g-4 kartyak">
                        <!-- kartyak -->
                    </div>
                </div>
                
                <!-- Kosár sáv -->
                <aside class="col-lg-4 mt-4 mt-lg-0">
                    <div class="card shadow-sm border-0 sticky-top" style="top: 20px;">
                        <div class="card-header bg-dark text-light rounded-top">
                            <h3 class="h5 mb-0 d-flex justify-content-between align-items-center">
                                🛒 Kosaram
                                <span id="kosarDarab" class="badge bg-warning text-dark ms-2">0</span>
                            </h3>
                        </div>
                        <div class="card-body p-0">
                            <div id="kosarLista" class="list-group list-group-flush">
                                <div class="text-center text-muted py-5">✨ A kosár üres</div>
                            </div>
                        </div>
                        <div class="card-footer bg-light">
                            <div class="d-flex justify-content-between align-items-center fw-bold fs-5">
                                <span>Összesen:</span>
                                <span id="kosarOsszeg" class="text-success">0 FT</span>
                            </div>
                            <button class="btn btn-danger w-100 mt-3" id="kosarUrites">
                                🧹 Kosár ürítése
                            </button>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
        
        <footer class="mt-auto text-center py-3 bg-dark text-light">
            <p class="m-0">&copy; Minden jog fenntartva</p>
        </footer>
    </main>
</body>
</html>
